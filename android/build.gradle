plugins {
    id 'com.android.library'
    id 'kotlin-android'
}

group 'com.tpay'
version '1.2.12'

android {
    namespace 'com.tpay'
    compileSdkVersion 35

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        minSdkVersion 23
        buildConfigField "String", "TPAY_FLUTTER_SDK_VERSION", "\"${project.version}\""
    }
}

dependencies {
    implementation 'com.tpay:sdk:1.2.7'
    implementation 'com.android.support:support-v4:28.0.0'
}
